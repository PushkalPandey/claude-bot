<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#0f1117"/>
  <circle cx="200" cy="200" r="190" fill="url(#glowGrad)"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="url(#bgGrad)" stroke-width="3"/>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#1e2130" stroke-width="1"/>

  <!-- Bot head -->
  <rect x="118" y="118" width="164" height="140" rx="24" ry="24" fill="#1e2130" stroke="url(#bgGrad)" stroke-width="2.5" filter="url(#softglow)"/>

  <!-- Antenna -->
  <line x1="200" y1="118" x2="200" y2="90" stroke="url(#bgGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="84" r="8" fill="url(#bgGrad)" filter="url(#glow)"/>

  <!-- Eyes -->
  <rect x="148" y="152" width="32" height="22" rx="8" fill="url(#bgGrad)" filter="url(#glow)"/>
  <rect x="220" y="152" width="32" height="22" rx="8" fill="url(#bgGrad)" filter="url(#glow)"/>

  <!-- Eye shine -->
  <rect x="153" y="156" width="10" height="6" rx="3" fill="white" opacity="0.5"/>
  <rect x="225" y="156" width="10" height="6" rx="3" fill="white" opacity="0.5"/>

  <!-- Mouth / status bar -->
  <rect x="155" y="196" width="90" height="12" rx="6" fill="#2d3348"/>
  <rect x="155" y="196" width="58" height="12" rx="6" fill="url(#bgGrad)" filter="url(#softglow)"/>

  <!-- Neck -->
  <rect x="182" y="258" width="36" height="18" rx="4" fill="#1e2130" stroke="#2d3348" stroke-width="1.5"/>

  <!-- Body -->
  <rect x="120" y="276" width="160" height="80" rx="20" ry="20" fill="#1e2130" stroke="url(#bgGrad)" stroke-width="2" filter="url(#softglow)"/>

  <!-- Body detail — streaming bars -->
  <rect x="142" y="296" width="116" height="7" rx="3.5" fill="#2d3348"/>
  <rect x="142" y="296" width="80" height="7" rx="3.5" fill="url(#bgGrad)" opacity="0.85"/>

  <rect x="142" y="312" width="116" height="7" rx="3.5" fill="#2d3348"/>
  <rect x="142" y="312" width="50" height="7" rx="3.5" fill="url(#bgGrad)" opacity="0.6"/>

  <rect x="142" y="328" width="116" height="7" rx="3.5" fill="#2d3348"/>
  <rect x="142" y="328" width="95" height="7" rx="3.5" fill="url(#bgGrad)" opacity="0.4"/>

  <!-- Slack hash bolt — top right badge -->
  <circle cx="308" cy="96" r="30" fill="#1e2130" stroke="url(#bgGrad)" stroke-width="2"/>
  <text x="308" y="104" font-family="monospace" font-size="26" font-weight="900" text-anchor="middle" fill="url(#bgGrad)" filter="url(#softglow)">#</text>

  <!-- Label -->
  <text x="200" y="388" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="4" fill="#64748b">CLAUDE BOT</text>
</svg>
